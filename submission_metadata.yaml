# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Claude (Anthropic) was used throughout the project for architecture design,
  scoring formula development, code review, and code generation across all
  pipeline modules. Key engineering decisions discussed with Claude include:
  embedding model selection (BGE-base over lighter alternatives), the two-phase
  pre-computation/ranking split, honeypot detection logic, weighted feature
  fusion weights, and tie-breaking strategy. All code was reviewed, debugged,
  and validated by the participant. No candidate data or profile content was
  sent to any external LLM or API. The ranking step itself runs entirely
  offline with no network access.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase pipeline. Phase 1 (pre-computation, no time limit): all 100,000
  candidate profiles are converted to rich text representations prioritising
  career history descriptions over skills lists, then embedded using
  BAAI/bge-base-en-v1.5 (768-dim). The job description is distilled into a
  focused query embedding using BGE's asymmetric retrieval instruction prefix.
  Five structured feature scores are extracted per candidate: career quality
  (product-company ratio, AI/ML title progression, tenure stability), 
  availability (activity recency, open-to-work flag, response rate, notice
  period, interview completion), location (tiered against Pune/Noida
  preference), and skill depth (assessment-verified JD-relevant skills plus
  GitHub activity). A honeypot multiplier (0.05–1.0) flags structural
  impossibilities — education timeline paradoxes, proficiency inflation vs
  verified assessments, expert skills with zero duration. Phase 2 (ranking,
  <10 seconds on CPU): cosine similarity is computed as a single numpy matrix
  multiply. A weighted composite score (semantic 35%, career quality 25%,
  availability 20%, location 15%, skill depth 5%) is fused, the honeypot
  multiplier is applied, and top-100 candidates are selected with
  candidate_id tie-breaking. Reasoning is generated from literal profile
  fields — no LLM calls at ranking time.

